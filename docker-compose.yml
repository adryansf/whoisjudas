services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 3001
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/socket.io/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
